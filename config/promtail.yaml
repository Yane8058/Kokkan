server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/log/promtail-positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: kokkan
    static_configs:
      - targets:
          - localhost
        labels:
          job: kokkan
          __path__: /opt/kokkan/logs/audit.log
